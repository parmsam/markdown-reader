name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14   # Apple Silicon (ARM64) — required for MLX at runtime
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ---

            **Requirements:** macOS Apple Silicon (M1/M2/M3)

            **First-time setup** — install Python dependencies before launching:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/setup.sh | bash
            ```

            **If you see "app is damaged and can't be opened":**
            ```bash
            xattr -dr com.apple.quarantine /Applications/Markdown\ Reader.app
            ```
          releaseDraft: false
          prerelease: false
